<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AllThingsFitness</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="index.html" class="nav-logo">ALLTHINGSFITNESS</a>

        <ul class="nav-links">
            <li><a href="workout.html">Workouts</a></li>
            <li><a href="food.html">Food</a></li>
            <li><a href="chatbots.html">Chatbots</a></li>
        </ul>

        <a href="login.html" class="nav-avatar">?</a>
    </nav>

    <!-- LOGIN FORM -->
    <div class="auth-wrapper">
        <div class="auth-card">
            <h1>Welcome back</h1>
            <p class="subtitle">Log in to continue your fitness journey.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="john@example.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required />
                </div>

                <button type="submit">Log In</button>
                <p class="error" id="errorMsg"></p>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script>
        // If they're already logged in, send the logo to the dashboard instead of the landing page
        if (localStorage.getItem('token') && JSON.parse(localStorage.getItem('user') || 'null')?.first_name) {
            document.querySelector('.nav-logo').href = 'dashboard.html';
        }

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.style.display = 'none';

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                // Send credentials to the backend
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorMsg.textContent = data.message;
                    errorMsg.style.display = 'block';
                    return;
                }

                // Save the JWT + user info so other pages know who's logged in
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                window.location.href = 'dashboard.html';

            } catch (err) {
                // Network error (server down, no internet, etc.)
                errorMsg.textContent = 'Could not connect to the server.';
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>
</html>
